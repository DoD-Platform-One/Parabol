apiVersion: v1
kind: ConfigMap
metadata:
  name: parabol-config
data:
  {{- range $key, $value := .Values.parabolDeployment.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- $nginxEnabled := false }}
{{- if .Values.parabolDeployment.nginx.enabled }}
  {{- if eq .Values.parabolDeployment.env.fileStoreProvider "local" }}
    {{- $nginxEnabled = true }}
  {{- else if and (eq .Values.parabolDeployment.env.fileStoreProvider "s3") .Values.parabolDeployment.env.proxyCDN }}
    {{- $nginxEnabled = true }}
  {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parabol-webserver
  labels:
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/name: parabol
    app.kubernetes.io/component: webserver
spec:
  replicas: {{ .Values.services.parabol.replicas }}
  strategy:
    type: {{ .Values.parabolDeployment.strategy.type }}
    {{- if eq .Values.parabolDeployment.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.parabolDeployment.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.parabolDeployment.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: webserver
      app.kubernetes.io/name: parabol
  template:
    metadata:
      annotations:
        {{- with .Values.services.parabol.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if and $nginxEnabled (not .Values.parabolDeployment.nginx.existingConfigMap) }}
        checksum/nginx-config: {{ include (print $.Template.BasePath "/webserver/nginx-config.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        app.kubernetes.io/name: parabol
        app.kubernetes.io/component: webserver
        app.kubernetes.io/version: "{{ .Values.services.parabol.version | default .Chart.AppVersion }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      {{- if or .Values.services.parabol.serviceAccount.create .Values.services.parabol.serviceAccount.name }}
      serviceAccountName: {{ .Values.services.parabol.serviceAccount.name | default "parabol-webserver" }}
      {{- end }}
      {{- if or .Release.IsInstall .Values.parabolDeployment.extraInitContainers $nginxEnabled }}
      initContainers:
        {{- if .Release.IsInstall }}
        - name: wait-for-databases
          image: "{{ .Values.global.imageRegistry.host }}/{{ .Values.services.parabol.image }}:{{ .Values.services.parabol.version | default .Chart.AppVersion }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for connectivity..."

              # 1. Wait for Postgres Port (TCP only, ignores SSL/Auth)
              PG_PORT=${POSTGRES_PORT:-5432}
              until nc -z -v -w5 "$POSTGRES_HOST" "$PG_PORT"; do
                echo "Postgres ($POSTGRES_HOST:$PG_PORT) is not listening yet. Sleeping..."
                sleep 5
              done
              echo "Postgres TCP port is open!"

              # 2. Wait for Redis Port
              # Parsing the host/port from the URL manually to avoid needing redis-cli
              tmp="${REDIS_URL#*://}"   # remove protocol
              tmp="${tmp#*@}"          # remove auth
              tmp="${tmp%%/*}"         # remove db path
              R_HOST="${tmp%:*}"       # extract host
              R_PORT="${tmp##*:}"      # extract port
              [ "$R_HOST" = "$R_PORT" ] && R_PORT=6379 # handle default port case

              until nc -z -v -w5 "$R_HOST" "$R_PORT"; do
                echo "Redis ($R_HOST:$R_PORT) is not listening yet. Sleeping..."
                sleep 5
              done
              echo "Redis TCP port is open!"
          env:
            - name: POSTGRES_HOST
              value: "{{ .Values.database.env.postgresHost }}"
            - name: POSTGRES_PORT
              value: "{{ .Values.database.env.postgresPort }}"
            - name: REDIS_URL
              value: "{{ .Values.parabolDeployment.env.redisUrl }}"
        {{- end }}
        {{- with .Values.parabolDeployment.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $nginxEnabled }}
        - name: copy-static-assets
          image: "{{ .Values.global.imageRegistry.host }}/{{ .Values.services.parabol.image }}:{{ .Values.services.parabol.version | default .Chart.AppVersion }}"
          command: ["/bin/sh", "-c"]
          args:
            - "cp -r /home/node/parabol/build/* /var/www/build/"
          volumeMounts:
            - name: static-assets
              mountPath: /var/www/build
        {{- end }}
      {{- end }}
      containers:
      - name: parabol
        command: ["/bin/sh"]
        args:
          - "-c"
          - |
            export SERVER_ID=`../tools/ip-to-server_id/index.js $(POD_IP)` && \
            exec node --trace-warnings ./dist/web.js
        image: "{{ .Values.global.imageRegistry.host }}/{{ .Values.services.parabol.image }}:{{ .Values.services.parabol.version | default .Chart.AppVersion }}"
        env:
          - name: FILE_STORE_PROVIDER
            value: "{{ .Values.parabolDeployment.env.fileStoreProvider }}"
          - name: CDN_BASE_URL
            value: "{{ .Values.parabolDeployment.env.cdnBaseUrl }}"
          - name: PROXY_CDN
            value: "{{ .Values.parabolDeployment.env.proxyCDN }}"
          - name: PORT
            value: "{{ .Values.parabolDeployment.env.port }}"
          - name: POSTGRES_DB
            value: "{{ .Values.database.env.postgresDb }}"
          - name: POSTGRES_USER
            value: "{{ .Values.database.env.postgresUser }}"
          - name: POSTGRES_HOST
            value: "{{ .Values.database.env.postgresHost }}"
          - name: POSTGRES_PORT
            value: "{{ .Values.database.env.postgresPort }}"
          - name: POSTGRES_PASSWORD
            value: "{{ .Values.database.env.postgresPassword }}"
          - name: REDIS_URL
            value: "{{ .Values.parabolDeployment.env.redisUrl }}"
          - name: HOST
            value: "{{ .Values.parabolDeployment.env.host }}"
          - name: INVITATION_SHORTLINK
            value: "{{ .Values.parabolDeployment.env.invitationShortlink }}"
          - name: PROTO
            value: "{{ .Values.parabolDeployment.env.protocol }}"
          - name: SERVER_SECRET
            value: "{{ .Values.parabolDeployment.env.serverSecret }}"
          - name: AUTH_INTERNAL_DISABLED
            value: "{{ .Values.parabolDeployment.env.authInternalDisabled }}"
          - name: AUTH_GOOGLE_DISABLED
            value: "{{ .Values.parabolDeployment.env.authGooleDisabled }}"
          - name: AUTH_MICROSOFT_DISABLED
            value: "{{ .Values.parabolDeployment.env.authMicrosoftDisabled }}"
          - name: AUTH_SSO_DISABLED
            value: "{{ .Values.parabolDeployment.env.authSsoDisabled }}"
          - name: IS_ENTERPRISE
            value: "{{ .Values.parabolDeployment.env.isEnterprise }}"
          - name: GOOGLE_CLOUD_CLIENT_EMAIL
            value: "{{ .Values.parabolDeployment.env.googleCloudClientEmail }}"
          - name: GOOGLE_CLOUD_PRIVATE_KEY
            value: "{{ .Values.parabolDeployment.env.googleCloudPrivateKey }}"
          - name: GOOGLE_CLOUD_PRIVATE_KEY_ID
            value: "{{ .Values.parabolDeployment.env.googleCloudPrivateKeyId }}"
          - name: SAML_ISSUER
            value: "{{ .Values.parabolDeployment.env.samlIssuer }}"
          - name: AWS_ACCESS_KEY_ID
            value: "{{ .Values.parabolDeployment.env.awsAccessKeyId }}"
          - name: AWS_REGION
            value: "{{ .Values.parabolDeployment.env.awsRegion }}"
          - name: AWS_SECRET_ACCESS_KEY
            value: "{{ .Values.parabolDeployment.env.awsSecretAccessKey }}"
          - name: AWS_S3_BUCKET
            value: "{{ .Values.parabolDeployment.env.awsS3Bucket }}"
          - name: GLOBAL_BANNER_ENABLED
            value: "{{ .Values.parabolDeployment.env.globalBannerEnabled }}"
          - name: GLOBAL_BANNER_TEXT
            value: "{{ .Values.parabolDeployment.env.globalBannerText }}"
          - name: GLOBAL_BANNER_BG_COLOR
            value: "{{ .Values.parabolDeployment.env.globalBannerBgColor }}"
          - name: GLOBAL_BANNER_COLOR
            value: "{{ .Values.parabolDeployment.env.globalBannerColor }}"
          - name: GIF_PROVIDER
            value: "{{ .Values.parabolDeployment.env.gifProvider }}"
          - name: TENOR_SECRET
            value: "{{ .Values.parabolDeployment.env.tenorSecret }}"
          - name: MAIL_PROVIDER
            value: "{{ .Values.parabolDeployment.env.mailProvider }}"
          - name: MAIL_FROM
            value: "{{ .Values.parabolDeployment.env.mailFrom }}"
          - name: MAIL_SMTP_HOST
            value: "{{ .Values.parabolDeployment.env.mailSmtpHost }}"
          - name: MAIL_SMTP_PORT
            value: "{{ .Values.parabolDeployment.env.mailSmtpPort }}"
          - name: MAIL_SMTP_USER
            value: "{{ .Values.parabolDeployment.env.mailSmtpUser }}"
          - name: MAIL_SMTP_PASSWORD
            value: "{{ .Values.parabolDeployment.env.mailSmtpPassword }}"
          - name: MAIL_SMTP_USE_TLS
            value: "{{ .Values.parabolDeployment.env.mailSmtpUseTls }}"
          - name: MAIL_SMTP_CIPHERS
            value: "{{ .Values.parabolDeployment.env.mailsmtpCiphers }}"
          - name: MAIL_SMTP_URL
            value: "{{ .Values.parabolDeployment.env.mailSmtpURL }}"
          - name: MAIL_SMTP_DEBUG
            value: "{{ .Values.parabolDeployment.env.mailSmtpDebug }}"
          - name: CHRONOS_AUTOPAUSE
            value: "{{ .Values.parabolDeployment.env.chronosAutoPause }}"
          - name: CHRONOS_UPDATE_TOKENS
            value: "{{ .Values.parabolDeployment.env.chronosUpdateTokens }}"
          - name: CHRONOS_PROCESS_RECURRENCE
            value: "{{ .Values.parabolDeployment.env.chronosProcessRecurrence }}"
          - name: CHRONOS_SCHEDULE_JOBS
            value: "{{ .Values.parabolDeployment.env.chronosScheduleJobs }}"
          - name: CHRONOS_BATCH_EMAILS
            value: "{{ .Values.parabolDeployment.env.chronosBatchEmails }}"
          - name: AUDIT_LOGS
            value: "{{ .Values.parabolDeployment.env.auditLogs }}"
          - name: MATTERMOST_URL
            value: "{{ .Values.parabolDeployment.env.mattermost.instanceUrl }}"
          - name: MATTERMOST_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-mattermost-secret
                key: secret
                optional: true
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          {{- if .Values.parabolDeployment.additionalEnv }}
          {{- toYaml .Values.parabolDeployment.additionalEnv | nindent 10 }}
          {{- end }}
        {{- with .Values.parabolDeployment.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if or .Values.services.parabol.localStorage.enabled .Values.services.parabol.extraVolumeMounts }}
        volumeMounts:
          {{- with .Values.services.parabol.localStorage.enabled }}
          - name: parabol-data-volume
            mountPath: /home/node/parabol/self-hosted
            subPath: self-hosted
          {{- end }}
          {{- with .Values.services.parabol.extraVolumeMounts }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        resources:
            {{- toYaml .Values.services.parabol.resources | nindent 12 }}
        ports:
        - name: webserver
          containerPort: {{ .Values.parabolDeployment.env.port }}
          protocol: TCP
        {{- if .Values.services.parabol.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.services.parabol.livenessProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.services.parabol.readinessProbe }}
        readinessProbe:
        {{- toYaml .Values.services.parabol.readinessProbe | nindent 12 }}
        {{- end }}
        {{- if .Values.services.parabol.startupProbe }}
        startupProbe:
          {{- toYaml .Values.services.parabol.startupProbe | nindent 12 }}
        {{- end }}
      {{- if $nginxEnabled }}
      - name: nginx-sidecar
        image: "{{ .Values.parabolDeployment.nginx.image.repository }}:{{ .Values.parabolDeployment.nginx.image.tag }}"
        ports:
        - name: nginx
          containerPort: {{ .Values.parabolDeployment.nginx.port | default 80 }}
          protocol: TCP
        volumeMounts:
          - name: static-assets
            mountPath: /usr/share/nginx/html/build
            readOnly: true
          - name: nginx-config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
          - name: nginx-cache
            mountPath: /var/cache/nginx
          {{- if eq .Values.parabolDeployment.env.fileStoreProvider "local" }}
            {{- if .Values.services.parabol.localStorage.enabled }}
          - name: parabol-data-volume
            mountPath: /usr/share/nginx/html/assets
            subPath: self-hosted
            readOnly: true
            {{- end }}
          {{- end }}
        resources:
          {{- toYaml .Values.parabolDeployment.nginx.resources | nindent 10 }}
      {{- end }}
      {{- with .Values.parabolDeployment.extraContainers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.global.imageRegistry.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.services.parabol.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.services.parabol.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.services.parabol.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.services.parabol.localStorage.enabled .Values.services.parabol.extraVolumes $nginxEnabled }}
      volumes:
        {{- with .Values.services.parabol.localStorage.enabled }}
        - name: parabol-data-volume
          persistentVolumeClaim:
            claimName: parabol-data-pvc
        {{- end }}
        {{- with .Values.services.parabol.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $nginxEnabled }}
        - name: static-assets
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: {{ .Values.parabolDeployment.nginx.existingConfigMap | default (printf "%s-nginx-config" .Release.Name) }}
        {{- end }}
      {{- end }}
