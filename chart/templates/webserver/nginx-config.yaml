{{- $nginxEnabled := false }}
{{- if .Values.parabolDeployment.nginx.enabled }}
  {{- if eq .Values.parabolDeployment.env.fileStoreProvider "local" }}
    {{- $nginxEnabled = true }}
  {{- else if and (eq .Values.parabolDeployment.env.fileStoreProvider "s3") .Values.parabolDeployment.env.proxyCDN }}
    {{- $nginxEnabled = true }}
  {{- end }}
{{- end }}

{{- if and $nginxEnabled (not .Values.parabolDeployment.nginx.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-config
  labels:
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/name: parabol
    app.kubernetes.io/component: webserver
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen {{ .Values.parabolDeployment.nginx.port | default 80 }};
        server_name localhost;
        keepalive_timeout 620s;
        root /usr/share/nginx/html;

        # Health check
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }

        {{- if and (eq .Values.parabolDeployment.env.fileStoreProvider "s3") .Values.parabolDeployment.env.proxyCDN }}
        # Serve static build files
        location /build/ {
            include /etc/nginx/mime.types;
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, no-transform";
        }
        {{- end }}

        {{- if eq .Values.parabolDeployment.env.fileStoreProvider "local" }}
        # Serve static build files
        location /static/ {
            include /etc/nginx/mime.types;
            alias /usr/share/nginx/html/build/;
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, no-transform";
        }
        # Serve dynamic assets
        location /assets/ {
            include /etc/nginx/mime.types;
            try_files $uri $uri/ =404;
            add_header Cache-Control "public, no-transform";
        }
        {{- end }}

        # Proxy everything else to Parabol Node.js app
        location / {
            proxy_pass http://localhost:{{ .Values.parabolDeployment.env.port }};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Forward real IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
{{- end }}
