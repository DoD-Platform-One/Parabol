{{- if .Values.textEmbeddingsInference.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-text-embeddings-inference
spec:
  type: ClusterIP
  ports:
  - name: inference
    port: 3040
    targetPort: 3040
  selector:
    app.kubernetes.io/component: text-embeddings-inference
    app.kubernetes.io/name: parabol
{{- end }}
